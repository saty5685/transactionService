# Transaction Service — application configuration
#
# TRANSACTION-SERVICE-SPECIFIC CONFIGURATION:
#   - Downstream service URLs (user-service, wallet-service, fraud-service)
#   - Saga timeout thresholds (debit, credit, reversal step timeouts)
#   - Kafka consumer concurrency (wallet.events listener)
#   - Redis idempotency lock TTL
#   - RestTemplate timeouts per external service
#
# SECRETS STRATEGY: same as other services.
#   local  → plaintext dev values
#   docker → ${ENV_VAR} with Docker Compose .env defaults
#   prod   → ${ENV_VAR} required (fails fast if missing), no plaintext
#
# jwt.secret MUST be identical across all three services (User, Wallet, Transaction).
# In production, all read from the same Vault path: secret/digitalwallet/jwt-signing-key
# ─────────────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════════════
# BASE CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: transactionService
  profiles:
    default: local


  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
      # false — forward compatible: new fields from Wallet Service events are ignored
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

  # ── Kafka base config ─────────────────────────────────────────────────────
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
        # No type headers — Wallet Service consumers are Java-based but other
        # consumers of txn.events (Ledger, Notification) may be polyglot.
        max.in.flight.requests.per.connection: 5
        # 5 in-flight requests max with idempotence enabled.
        # Kafka idempotent producer requires <= 5; any higher and Kafka
        # rejects the configuration at startup.
        spring.json.value.default.type: "java.util.LinkedHashMap"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.deezylwallet.*"
        spring.json.use.type.headers: false
        # No type headers on consume side matches our producer config.
        # We route based on the eventType field in the payload, not headers.

  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

server:
  port: 8084
  # Transaction Service: port 8084. Convention: 808{service number}.
  # User: 8081, Wallet: 8082, Transaction: 8083.
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# ── JWT (resource server — validates only, never issues) ─────────────────────
jwt:
  issuer: digital-wallet-platform
  # secret: SET PER PROFILE

# ── Downstream service base URLs ──────────────────────────────────────────────
# Injected into PreflightService via @Value
services:
  user-service:
    base-url: http://user-service:8081      # overridden per profile
  wallet-service:
    base-url: http://wallet-service:8082    # overridden per profile
  fraud-service:
    base-url: http://fraud-service:8090     # overridden per profile

# ── Kafka topic names (overridable for testing) ────────────────────────────────
kafka:
  topics:
    wallet-commands: wallet.commands
    wallet-events: wallet.events
    txn-events: txn.events
  consumer:
    concurrency: 3
    # 3 concurrent consumer threads per partition.
    # Transactions keyed by transactionId → same partition → ordering preserved.
    # 3 threads = 3 independent transactions can be processed in parallel.
    # Increase if wallet.events consumer lag grows under high load.

# ── Saga timeouts (seconds) ───────────────────────────────────────────────────
# Extracted to YAML so they can be tuned per environment without redeployment.
# SagaTimeoutJob reads TxnConstants but these override via @Value if needed.
saga:
  timeout:
    debit-seconds: 300       # 5 minutes — PENDING_DEBIT step timeout
    credit-seconds: 300      # 5 minutes — PENDING_CREDIT step timeout
    reversal-seconds: 600    # 10 minutes — REVERSING step timeout
  timeout-job:
    interval-ms: 60000       # Job runs every 60 seconds

# ── Async executor (for future @Async methods) ────────────────────────────────
spring.task.execution:
  pool:
    core-size: 4
    max-size: 8
    queue-capacity: 100
  thread-name-prefix: txn-async-


# ═════════════════════════════════════════════════════════════════════════════
# LOCAL PROFILE
# ═════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/transaction_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TxnServicePool-Local
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: transaction-service-local

jwt:
  secret: bG9jYWwtZGV2LXNlY3JldC1mb3ItdXNlci1zZXJ2aWNlLW9ubHktbm90LXByb2R1Y3Rpb24tNjRieXRlc21pbg==

# Downstream service URLs — all on localhost when running without Docker Compose
services:
  user-service:
    base-url: http://localhost:8083
  wallet-service:
    base-url: http://localhost:8082
  fraud-service:
    base-url: http://localhost:8090

logging:
  level:
    root: INFO
    com.deezyWallet.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.kafka: INFO
    org.springframework.security: DEBUG
    org.flywaydb: INFO

server:
  port: 8084